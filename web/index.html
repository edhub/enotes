<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Timeline Kanban note-taking app.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eNotes">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="theme-color" content="#6366F1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>eNotes</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0B0F18;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1e2336;
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      color: #64748b;
      font-size: 13px;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span class="loading-label" id="loading-label">Loading…</span>
  </div>

  <script>
    // Register our custom service worker (handles offline caching).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(e) {
        console.warn('SW registration failed:', e);
      });
      // When a new SW takes control (after skipWaiting), reload to pick up fresh assets.
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }

    // Hide the loading screen once Flutter mounts.
    // Flutter fires this event after the first frame is rendered.
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function() { el.remove(); }, 350);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
